<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hjem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Azeret Mono', monospace;
    background: #1e293b;
    color: #94a3b8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  .page { text-align: right; font-size: 1.6rem; font-weight: 300; line-height: 2; }
  .page > a {
    display: block; width: fit-content; margin-left: auto;
    color: inherit; text-decoration: none; position: relative;
    padding: 0.05em 0.3em; margin-right: -0.3em; transition: color 0.3s ease;
  }
  .page > a::before {
    content: ''; position: absolute; inset: 0; background: #f59e0b;
    transform: scaleX(0); transform-origin: right;
    transition: transform 0.35s cubic-bezier(0.25,0.1,0.25,1); z-index: -1;
  }
  .page > a:hover { color: #1e293b; }
  .page > a:hover::before { transform: scaleX(1); }

  .panel-trigger {
    display: block; width: fit-content; margin-left: auto;
    color: inherit; text-decoration: none; position: relative;
    padding: 0.05em 0.3em; margin-right: -0.3em; transition: color 0.3s ease;
    cursor: pointer; background: none; border: none; font: inherit; text-align: right;
  }
  .panel-trigger::before {
    content: ''; position: absolute; inset: 0; background: #f59e0b;
    transform: scaleX(0); transform-origin: right;
    transition: transform 0.35s cubic-bezier(0.25,0.1,0.25,1); z-index: -1;
  }
  .panel-trigger:hover, .panel-trigger.active { color: #1e293b; }
  .panel-trigger:hover::before, .panel-trigger.active::before { transform: scaleX(1); }

  .hotkey {
    display: inline-flex; align-items: center; justify-content: center;
    font-size: 0.75em; font-weight: 400; width: 1.6em; height: 1.6em;
    border-radius: 3px; margin-left: 0.5em; vertical-align: middle;
    transition: color 0.3s ease, border-color 0.3s ease, background 0.3s ease, opacity 0.3s ease;
  }
  a:hover .hotkey, .panel-trigger:hover .hotkey, .panel-trigger.active .hotkey {
    color: #1e293b; border-color: #1e293b; border-style: dashed;
  }
  .keys-ghost .hotkey { color: #f59e0b; border: 1px dashed #475569; }

  .panel {
    position: fixed; top: 0; width: 520px; height: 100vh;
    background: #0f172a; transition: transform 0.4s cubic-bezier(0.25,0.1,0.25,1);
    z-index: 100; display: flex; flex-direction: column;
  }
  .panel.from-right { right: 0; border-left: 1px solid #334155; transform: translateX(100%); }
  .panel.from-left { left: 0; border-right: 1px solid #334155; transform: translateX(-100%); }
  .panel.open { transform: translateX(0); }

  .panel-header { padding: 1.5rem 1.5rem 0; flex-shrink: 0; }
  .panel-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .panel-title { font-size: 1.1rem; font-weight: 400; color: #f59e0b; letter-spacing: 0.05em; }
  .panel-close {
    background: none; border: none; color: #64748b; font-family: inherit;
    font-size: 1rem; cursor: pointer; padding: 0.2em 0.4em; transition: color 0.2s ease;
  }
  .panel-close:hover { color: #f59e0b; }

  .panel-tabs { display: flex; gap: 0; margin-bottom: 1rem; }
  .panel-tab {
    flex: 1; padding: 0.5em 0; background: none; border: 1px solid #334155;
    color: #64748b; font: inherit; font-size: 0.95rem; font-weight: 400;
    cursor: pointer; transition: all 0.25s ease; letter-spacing: 0.03em;
  }
  .panel-tab:first-child { border-radius: 3px 0 0 3px; }
  .panel-tab:last-child { border-radius: 0 3px 3px 0; border-left: none; }
  .panel-tab.active { background: #f59e0b; border-color: #f59e0b; color: #0f172a; }

  .panel-search {
    width: 100%; padding: 0.6em 0.8em; background: #1e293b;
    border: 1px solid #334155; border-radius: 3px; color: #e2e8f0;
    font: inherit; font-size: 0.95rem; font-weight: 300; outline: none;
    transition: border-color 0.2s ease; margin-bottom: 0.5rem;
  }
  .panel-search::placeholder { color: #475569; }
  .panel-search:focus { border-color: #f59e0b; }

  .panel-list {
    flex: 1; overflow-y: auto; padding: 0.5rem 1.5rem 1.5rem;
    scrollbar-width: thin; scrollbar-color: #334155 transparent;
  }
  .panel-list::-webkit-scrollbar { width: 4px; }
  .panel-list::-webkit-scrollbar-track { background: transparent; }
  .panel-list::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

  .panel-item {
    display: flex; align-items: baseline; gap: 0.8em;
    padding: 0.55em 0.3em; text-decoration: none; color: #cbd5e1;
    font-size: 1.15rem; font-weight: 300; border-bottom: 1px solid #1e293b;
    transition: color 0.2s ease, background 0.2s ease;
  }
  .panel-item:hover, .panel-item.kb-active { color: #1e293b; background: #f59e0b; }
  .panel-item .num { flex-shrink: 0; width: 6em; text-align: right; font-weight: 500; color: #f59e0b; }
  .panel-item:hover .num, .panel-item.kb-active .num { color: #1e293b; }
  .panel-item .title { flex: 1; line-height: 1.5; }
  .panel-empty { color: #475569; font-size: 0.9rem; font-weight: 300; padding: 1em 0.3em; font-style: italic; }

  .overlay {
    position: fixed; inset: 0; background: rgba(15,23,42,0.5);
    opacity: 0; pointer-events: none; transition: opacity 0.3s ease; z-index: 99;
  }
  .overlay.open { opacity: 1; pointer-events: auto; }

  .panel-hint {
    color: #475569; font-size: 0.8rem; font-weight: 300; padding: 0 0.3em;
    margin-bottom: 0.5rem;
  }

  /* ── GDPR detail view ─────────────────────────────────────── */
  .detail-nav {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 1rem; padding-bottom: 0.6rem; border-bottom: 1px solid #334155;
  }
  .detail-back {
    background: none; border: none; color: #64748b; font: inherit;
    font-size: 0.95rem; cursor: pointer; padding: 0.2em 0; transition: color 0.2s;
  }
  .detail-back:hover { color: #f59e0b; }
  .rettsdata-link {
    color: #64748b; font-size: 0.9rem; text-decoration: none; transition: color 0.2s;
  }
  .rettsdata-link:hover { color: #f59e0b; }
  .detail-meta {
    color: #475569; font-size: 0.85rem; font-weight: 300; margin-bottom: 0.3rem;
  }
  .detail-title {
    color: #f59e0b; font-size: 1.05rem; font-weight: 400; line-height: 1.5;
    margin-bottom: 1.2rem;
  }
  .detail-body {
    color: #cbd5e1; font-size: 0.92rem; font-weight: 300; line-height: 1.75;
    padding-bottom: 1rem;
  }
  .detail-body .art-para { margin-bottom: 0.9em; }
  .detail-body .art-points { padding-left: 1.4em; margin-bottom: 0.9em; }
  .detail-body .art-point { margin-bottom: 0.25em; }
  .detail-footer {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.8rem 0; border-top: 1px solid #334155; margin-top: 0.5rem;
  }
  .detail-prev, .detail-next {
    background: none; border: none; color: #64748b; font: inherit;
    font-size: 0.9rem; cursor: pointer; padding: 0.2em 0; transition: color 0.2s;
  }
  .detail-prev:hover, .detail-next:hover { color: #f59e0b; }
  .search-snippet {
    display: block; font-size: 0.8rem; color: #64748b; font-weight: 300;
    margin-top: 0.2em; line-height: 1.5;
  }
  .search-snippet mark {
    background: rgba(245,158,11,0.25); color: #f59e0b;
    border-radius: 2px; padding: 0 0.15em;
  }
  .panel-item:hover .search-snippet,
  .panel-item.kb-active .search-snippet { color: #1e293b; }
  .panel-item:hover .search-snippet mark,
  .panel-item.kb-active .search-snippet mark {
    background: rgba(30,41,59,0.2); color: #1e293b;
  }
  .chapter-divider {
    display: flex; align-items: baseline; gap: 0.8em;
    padding: 0.8em 0.3em 0.3em; color: #475569;
    font-size: 0.85rem; font-weight: 400; letter-spacing: 0.03em;
    border-bottom: none; pointer-events: none;
  }
  .chapter-divider .num { flex-shrink: 0; width: 6em; text-align: right; color: #475569; }
  .chapter-divider .title { flex: 1; }
  .rec-preview {
    display: block; font-size: 0.8rem; color: #64748b; font-weight: 300;
    margin-top: 0.15em; line-height: 1.4; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis;
  }
  .panel-item:hover .rec-preview,
  .panel-item.kb-active .rec-preview { color: rgba(30,41,59,0.7); }

  @media (max-width: 600px) {
    .page { font-size: 1.3rem; }
    .panel { width: 100%; }
    body { padding: 2rem 1.5rem; }
  }
</style>

<script>
const panels = {};

/* ================================================================
   Generic panel init (used by EDPB)
   ================================================================ */
function initPanel(id, data, urlFn, prefixMap) {
  const el = document.getElementById('panel-' + id);
  const search = el.querySelector('.panel-search');
  const list = el.querySelector('.panel-list');
  const tabs = el.querySelectorAll('.panel-tab');
  const keys = Object.keys(data);
  let currentTab = keys[0];
  let activeIdx = -1;

  function render() {
    const q = search.value.toLowerCase().trim();
    const prefix = prefixMap && prefixMap[currentTab] || '';
    const items = data[currentTab].filter(item => {
      const label = typeof item[0] === 'number' && prefix ? `${prefix} ${item[0]}` : String(item[0]);
      return (label.toLowerCase() + ' ' + item[1].toLowerCase()).includes(q);
    });
    if (!items.length) { list.innerHTML = '<div class="panel-empty">Ingen treff</div>'; return; }
    list.innerHTML = items.map(item => {
      const url = item[2] || urlFn(currentTab, item[0]);
      const label = typeof item[0] === 'number' && prefix ? `${prefix} ${item[0]}` : item[0];
      return `<a class="panel-item" href="${url}"><span class="num">${label}</span><span class="title">${item[1]}</span></a>`;
    }).join('');
  }

  function updateActive() {
    list.querySelectorAll('.panel-item').forEach((el, i) => {
      el.classList.toggle('kb-active', i === activeIdx);
      if (i === activeIdx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  tabs.forEach(tab => tab.addEventListener('click', () => {
    currentTab = tab.dataset.tab;
    tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
    search.value = ''; activeIdx = -1; render(); list.scrollTop = 0; search.focus();
  }));

  search.addEventListener('input', () => { render(); activeIdx = -1; });

  panels[id] = {
    el, search, list, render, open() {
      closeAll();
      el.classList.add('open');
      document.getElementById('overlay').classList.add('open');
      document.querySelector(`[data-panel="${id}"].panel-trigger`)?.classList.add('active');
      render();
      setTimeout(() => search.focus(), 300);
    },
    close() {
      el.classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      document.querySelector(`[data-panel="${id}"].panel-trigger`)?.classList.remove('active');
      search.value = ''; activeIdx = -1;
    },
    keydown(e) {
      if (!el.classList.contains('open')) return;
      const items = list.querySelectorAll('.panel-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, -1); updateActive(); if (activeIdx===-1) search.focus(); }
      else if (e.key === 'Enter' && activeIdx >= 0 && items[activeIdx]) { e.preventDefault(); items[activeIdx].click(); }
      else if (e.key === 'Tab' && !e.shiftKey) { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(); }
      else if ((e.key === 'ArrowRight' || e.key === 'ArrowLeft') && !search.value && keys.length > 1) {
        e.preventDefault();
        const i = keys.indexOf(currentTab);
        const dir = e.key === 'ArrowRight' ? 1 : keys.length - 1;
        currentTab = keys[(i + dir) % keys.length];
        tabs.forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
        activeIdx = -1; render(); list.scrollTop = 0; search.focus();
      }
    }
  };
}

/* ================================================================
   GDPR panel (enhanced – uses gdpr.js for content)
   ================================================================ */
function initGdprPanel() {
  const el = document.getElementById('panel-gdpr');
  const header = el.querySelector('.panel-header');
  const search = el.querySelector('.panel-search');
  const list = el.querySelector('.panel-list');
  const tabBtns = el.querySelectorAll('.panel-tab');

  let currentTab = 'art';
  let activeIdx = -1;
  let detailMode = false;
  let detailNr = null;
  let detailType = null;

  const artMap = {};
  gdpr.articles.forEach(a => { artMap[a.nr] = a; });
  const recMap = {};
  gdpr.recitals.forEach(r => { recMap[r.nr] = r; });
  const chMap = {};
  gdpr.chapters.forEach(c => { chMap[c.nr] = c; });

  const artNrs = gdpr.articles.map(a => a.nr).sort((a, b) => a - b);
  const recNrs = gdpr.recitals.map(r => r.nr).sort((a, b) => a - b);

  function rettsdataUrl(nr) {
    return `https://min.rettsdata.no/Dokument/gL20180615z2D38z2EGDPRz5FNOz2DART${nr}`;
  }

  function esc(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function formatText(text) {
    const blocks = text.split('\n\n');
    let html = '';
    for (const block of blocks) {
      const t = block.trim();
      if (!t) continue;
      const lines = t.split('\n');
      if (lines.some(l => /^[a-zæøå]\)\s/.test(l.trim()))) {
        html += '<div class="art-points">';
        for (const line of lines) html += `<p class="art-point">${esc(line.trim())}</p>`;
        html += '</div>';
      } else {
        html += `<p class="art-para">${esc(t)}</p>`;
      }
    }
    return html;
  }

  function truncate(text, len) {
    const clean = text.replace(/\n+/g, ' ');
    return clean.length <= len ? clean : clean.slice(0, len).replace(/\s+\S*$/, '') + ' …';
  }

  function snippet(text, q, len) {
    len = len || 90;
    const i = text.toLowerCase().indexOf(q.toLowerCase());
    if (i === -1) return '';
    const a = Math.max(0, i - Math.floor(len / 2));
    const b = Math.min(text.length, i + q.length + Math.floor(len / 2));
    let s = (a > 0 ? '… ' : '') + text.slice(a, b) + (b < text.length ? ' …' : '');
    const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
    s = esc(s).replace(re, '<mark>$1</mark>');
    return s;
  }

  // ── List rendering ──────────────────────────────────────────
  function renderList() {
    activeIdx = -1;
    currentTab === 'art' ? renderArticles() : renderRecitals();
  }

  function renderArticles() {
    const q = search.value.toLowerCase().trim();
    let html = '', any = false;

    for (const ch of gdpr.chapters) {
      const matches = gdpr.articles.filter(a => a.ch === ch.nr).filter(a => {
        if (!q) return true;
        if ((`art. ${a.nr} ${a.no}`).toLowerCase().includes(q)) return true;
        return a.text.toLowerCase().includes(q);
      });
      if (!matches.length) continue;
      any = true;
      html += `<div class="chapter-divider"><span class="num">Kap. ${ch.nr}</span><span class="title">${esc(ch.no)}</span></div>`;

      for (const a of matches) {
        const titleHit = !q || (`art. ${a.nr} ${a.no}`).toLowerCase().includes(q);
        const snip = !titleHit && q ? `<span class="search-snippet">${snippet(a.text, q)}</span>` : '';
        html += `<a class="panel-item" href="#" data-detail="art" data-nr="${a.nr}"><span class="num">Art. ${a.nr}</span><span class="title">${esc(a.no)}${snip}</span></a>`;
      }
    }
    list.innerHTML = any ? html : '<div class="panel-empty">Ingen treff</div>';
    bindClicks();
  }

  function renderRecitals() {
    const q = search.value.toLowerCase().trim();
    let html = '', any = false;

    for (const r of gdpr.recitals) {
      const preview = truncate(r.no, 80);
      if (q) {
        const inPreview = (`rec. ${r.nr} ` + preview.toLowerCase()).includes(q);
        const inBody = r.no.toLowerCase().includes(q);
        if (!inPreview && !inBody) continue;
        any = true;
        const snip = !inPreview && inBody ? `<span class="search-snippet">${snippet(r.no, q)}</span>` : '';
        html += `<a class="panel-item" href="#" data-detail="rec" data-nr="${r.nr}"><span class="num">Rec. ${r.nr}</span><span class="title"><span class="rec-preview">${esc(preview)}</span>${snip}</span></a>`;
      } else {
        any = true;
        html += `<a class="panel-item" href="#" data-detail="rec" data-nr="${r.nr}"><span class="num">Rec. ${r.nr}</span><span class="title"><span class="rec-preview">${esc(preview)}</span></span></a>`;
      }
    }
    list.innerHTML = any ? html : '<div class="panel-empty">Ingen treff</div>';
    bindClicks();
  }

  function bindClicks() {
    list.querySelectorAll('[data-detail]').forEach(el => {
      el.addEventListener('click', e => {
        e.preventDefault();
        showDetail(el.dataset.detail, parseInt(el.dataset.nr));
      });
    });
  }

  // ── Detail view ─────────────────────────────────────────────
  function showDetail(type, nr) {
    detailMode = true;
    detailType = type;
    detailNr = nr;
    header.querySelectorAll('.panel-tabs, .panel-search').forEach(e => e.style.display = 'none');
    type === 'art' ? renderArtDetail(nr) : renderRecDetail(nr);
  }

  function renderArtDetail(nr) {
    const a = artMap[nr]; if (!a) return;
    const ch = chMap[a.ch];
    const idx = artNrs.indexOf(nr);
    const prev = idx > 0 ? artNrs[idx - 1] : null;
    const next = idx < artNrs.length - 1 ? artNrs[idx + 1] : null;

    list.innerHTML = `
      <div class="detail-nav">
        <button class="detail-back">← Tilbake</button>
        <a class="rettsdata-link" href="${rettsdataUrl(nr)}" target="_blank" rel="noopener">Rettsdata →</a>
      </div>
      ${ch ? `<div class="detail-meta">Kap. ${ch.nr} — ${esc(ch.no)}</div>` : ''}
      <div class="detail-title">Art. ${nr} — ${esc(a.no)}</div>
      <div class="detail-body">${formatText(a.text)}</div>
      <div class="detail-footer">
        ${prev != null ? `<button class="detail-prev" data-nr="${prev}">← Art. ${prev}</button>` : '<span></span>'}
        ${next != null ? `<button class="detail-next" data-nr="${next}">Art. ${next} →</button>` : '<span></span>'}
      </div>`;
    list.scrollTop = 0;
    bindNav('art');
  }

  function renderRecDetail(nr) {
    const r = recMap[nr]; if (!r) return;
    const idx = recNrs.indexOf(nr);
    const prev = idx > 0 ? recNrs[idx - 1] : null;
    const next = idx < recNrs.length - 1 ? recNrs[idx + 1] : null;
    const body = r.no.split(/\n\n|\n/).filter(Boolean).map(p => `<p class="art-para">${esc(p.trim())}</p>`).join('');

    list.innerHTML = `
      <div class="detail-nav">
        <button class="detail-back">← Tilbake</button>
        <span></span>
      </div>
      <div class="detail-title">Fortalepunkt ${nr}</div>
      <div class="detail-body">${body}</div>
      <div class="detail-footer">
        ${prev != null ? `<button class="detail-prev" data-nr="${prev}">← Rec. ${prev}</button>` : '<span></span>'}
        ${next != null ? `<button class="detail-next" data-nr="${next}">Rec. ${next} →</button>` : '<span></span>'}
      </div>`;
    list.scrollTop = 0;
    bindNav('rec');
  }

  function bindNav(type) {
    list.querySelector('.detail-back').addEventListener('click', hideDetail);
    const p = list.querySelector('.detail-prev');
    const n = list.querySelector('.detail-next');
    if (p) p.addEventListener('click', () => showDetail(type, parseInt(p.dataset.nr)));
    if (n) n.addEventListener('click', () => showDetail(type, parseInt(n.dataset.nr)));
  }

  function hideDetail() {
    detailMode = false; detailNr = null; detailType = null;
    header.querySelectorAll('.panel-tabs, .panel-search').forEach(e => e.style.display = '');
    renderList(); list.scrollTop = 0;
    setTimeout(() => search.focus(), 50);
  }

  // ── Keyboard active highlight ───────────────────────────────
  function updateActive() {
    list.querySelectorAll('.panel-item').forEach((el, i) => {
      el.classList.toggle('kb-active', i === activeIdx);
      if (i === activeIdx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  // ── Tabs ────────────────────────────────────────────────────
  tabBtns.forEach(tab => tab.addEventListener('click', () => {
    currentTab = tab.dataset.tab;
    tabBtns.forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
    search.value = ''; renderList(); list.scrollTop = 0; search.focus();
  }));

  search.addEventListener('input', () => renderList());

  // ── Panel interface ─────────────────────────────────────────
  panels['gdpr'] = {
    el, search, list, render: renderList,
    open() {
      closeAll();
      el.classList.add('open');
      document.getElementById('overlay').classList.add('open');
      document.querySelector('[data-panel="gdpr"].panel-trigger')?.classList.add('active');
      if (detailMode) hideDetail();
      renderList();
      setTimeout(() => search.focus(), 300);
    },
    close() {
      el.classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      document.querySelector('[data-panel="gdpr"].panel-trigger')?.classList.remove('active');
      search.value = ''; activeIdx = -1;
      if (detailMode) {
        detailMode = false; detailNr = null; detailType = null;
        header.querySelectorAll('.panel-tabs, .panel-search').forEach(e => e.style.display = '');
      }
    },
    keydown(e) {
      if (!el.classList.contains('open')) return;

      if (detailMode) {
        if (e.key === 'Escape') { e.preventDefault(); hideDetail(); return; }
        if (e.key === 'ArrowLeft') { const p = list.querySelector('.detail-prev'); if (p) { e.preventDefault(); showDetail(detailType, parseInt(p.dataset.nr)); } return; }
        if (e.key === 'ArrowRight') { const n = list.querySelector('.detail-next'); if (n) { e.preventDefault(); showDetail(detailType, parseInt(n.dataset.nr)); } return; }
        return;
      }

      const items = list.querySelectorAll('.panel-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, -1); updateActive(); if (activeIdx===-1) search.focus(); }
      else if (e.key === 'Enter' && activeIdx >= 0 && items[activeIdx]) { e.preventDefault(); items[activeIdx].click(); }
      else if (e.key === 'Tab' && !e.shiftKey) { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(); }
      else if ((e.key === 'ArrowRight' || e.key === 'ArrowLeft') && !search.value) {
        e.preventDefault();
        const tabs = ['art','rec'];
        currentTab = tabs[(tabs.indexOf(currentTab) + 1) % 2];
        tabBtns.forEach(t => t.classList.toggle('active', t.dataset.tab === currentTab));
        renderList(); list.scrollTop = 0; search.focus();
      }
    }
  };
}

function closeAll() { Object.values(panels).forEach(p => p.close()); }

(function() {

  const list = el.querySelector('.panel-list');
  const homeUrl = 'https://lovdata.no/pro/#myPage';

  function findLov(q) {

    return lovdataLookup.filter(entry =>
      entry.tags.some(tag => tag.includes(q)) || entry.title.toLowerCase().includes(q)
    );
  }

  function render() {
    const q = search.value.toLowerCase().trim();
    const results = findLov(q);
    if (!results.length) { list.innerHTML = '<div class="panel-empty">Ingen treff</div>'; return; }
    list.innerHTML = results.map(entry => {
      const url = `https://lovdata.no/pro/#document/${entry.id}`;
      const type = entry.id.startsWith('SF/') ? 'Forskrift' : entry.id.startsWith('PROP/') ? 'Forarbeid' : 'Lov';
      return `<a class="panel-item" href="${url}"><span class="num">${type}</span><span class="title">${entry.title}</span></a>`;
    }).join('');
  }

  function updateActive() {
    list.querySelectorAll('.panel-item').forEach((el, i) => {
      el.classList.toggle('kb-active', i === activeIdx);
      if (i === activeIdx) el.scrollIntoView({ block: 'nearest' });
    });
  }

  search.addEventListener('input', () => { render(); activeIdx = -1; });

  panels['lovdata'] = {
    el, search, list, render,
    open() {
      closeAll(); el.classList.add('open');
      document.getElementById('overlay').classList.add('open');
      document.querySelector('[data-panel="lovdata"].panel-trigger')?.classList.add('active');
      render(); setTimeout(() => search.focus(), 300);
    },
    close() {
      el.classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      document.querySelector('[data-panel="lovdata"].panel-trigger')?.classList.remove('active');
      search.value = ''; activeIdx = -1;
    },
    keydown(e) {
      if (!el.classList.contains('open')) return;
      const items = list.querySelectorAll('.panel-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIdx = Math.max(activeIdx-1, -1); updateActive(); if (activeIdx===-1) search.focus(); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        if (activeIdx >= 0 && items[activeIdx]) items[activeIdx].click();
        else if (!search.value.trim()) window.location.href = homeUrl;
        else if (items.length === 1) items[0].click();
      }
      else if (e.key === 'Tab' && !e.shiftKey) { e.preventDefault(); activeIdx = Math.min(activeIdx+1, items.length-1); updateActive(); }
    }
  };
})();

/* ================================================================
   Global event wiring
   ================================================================ */
document.querySelectorAll('.panel-trigger').forEach(btn => {
  btn.addEventListener('click', () => {
    const id = btn.dataset.panel;
    panels[id].el.classList.contains('open') ? panels[id].close() : panels[id].open();
  });
});

document.querySelectorAll('.panel-close').forEach(btn => {
  btn.addEventListener('click', () => panels[btn.dataset.panel].close());
});

document.getElementById('overlay').addEventListener('click', closeAll);

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeAll();
  const anyOpen = Object.values(panels).some(p => p.el.classList.contains('open'));
  if (anyOpen) {
    Object.values(panels).forEach(p => p.keydown(e));
    return;
  }
  if ((e.key >= '0' && e.key <= '9') || e.key === '+') {
    const target = document.querySelector(`[data-key="${e.key}"]`);
    if (target) target.click();
  }
});
