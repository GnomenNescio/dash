<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --base03:  #002b36;
    --base02:  #073642;
    --base01:  #586e75;
    --base00:  #657b83;
    --base0:   #839496;
    --base1:   #93a1a1;
    --base2:   #eee8d5;
    --base3:   #fdf6e3;
    --yellow:  #b58900;
    --orange:  #cb4b16;
    --red:     #dc322f;
    --magenta: #d33682;
    --violet:  #6c71c4;
    --blue:    #268bd2;
    --cyan:    #2aa198;
    --green:   #859900;
  }

  body {
    font-family: 'Azeret Mono', monospace;
    background: var(--base3);
    color: var(--base00);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
    transition: background-color 0.8s ease, color 0.5s ease;
  }
  body.warn     { background: #f5e1a0; }
  body.critical { background: #f0c4a0; }
  body.done     { background: var(--red); }

  .time-display {
    display: flex;
    align-items: center;
    gap: 0;
    font-size: clamp(80px, 18vw, 210px);
    font-weight: 300;
    letter-spacing: -0.02em;
    color: var(--base01);
    user-select: none;
    position: relative;
  }

  .time-display .sep {
    opacity: 0.3;
    margin: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 0.65ch;
  }

  .time-segment {
    position: relative;
    cursor: default;
    border-radius: 4px;
    transition: background 0.15s ease, color 0.15s ease;
    text-align: center;
  }

  .editing .time-segment { cursor: pointer; }
  .editing .time-segment:hover { background: var(--base2); }
  .editing .time-segment.active {
    background: var(--cyan);
    color: var(--base3);
  }

  .edit-hint {
    letter-spacing: normal;
    position: absolute;
    bottom: -2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 1rem;
    color: var(--base1);
    white-space: nowrap;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .editing .edit-hint { opacity: 1; }

  .controls {
    display: flex;
    gap: 1rem;
    margin-top: 2.5rem;
  }

  .btn {
    background: none;
    border: 1px solid var(--base1);
    color: var(--base00);
    font-family: inherit;
    font-size: 1.1rem;
    font-weight: 300;
    padding: 0.7em 2em;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s ease;
    letter-spacing: 0.03em;
    text-transform: lowercase;
  }
  .btn:hover {
    border-color: var(--cyan);
    color: var(--cyan);
  }
  #setTimeBtn:hover {
    border-color: var(--violet);
    color: var(--violet);
  }
  #resetBtn:hover {
    border-color: var(--yellow);
    color: var(--yellow);
  }
  .btn .shortcut {
    display: inline-block;
    margin-left: 1.2em;
    font-size: 0.65em;
    opacity: 0.4;
    border: 1px solid var(--base1);
    border-radius: 3px;
    padding: 0.15em 0.45em;
    vertical-align: middle;
    line-height: 1.4;
  }

  body.done .time-display,
  body.done .btn,
  body.done .edit-hint { color: var(--base3); }
  body.done .btn { border-color: rgba(253,246,227,0.3); }
  body.done .btn:hover { border-color: var(--base3); color: var(--base3); }
</style>
</head>
<body>

<div class="time-display" id="display">
  <span class="time-segment" data-unit="h" id="seg-h">00</span>
  <span class="sep">:</span>
  <span class="time-segment" data-unit="m" id="seg-m">10</span>
  <span class="sep">:</span>
  <span class="time-segment" data-unit="s" id="seg-s">00</span>
  <span class="edit-hint">↑↓ juster · tab neste · enter bekreft</span>
</div>

<div class="controls">
  <button class="btn" id="startPauseBtn" onclick="startPause()">start<span class="shortcut">mellomrom</span></button>
  <button class="btn" id="setTimeBtn" onclick="enterEditMode()">juster tid<span class="shortcut">enter</span></button>
  <button class="btn" id="resetBtn" onclick="resetTimer()">nullstill<span class="shortcut">shift</span></button>
</div>

<script>
  let setH=0,setM=10,setS=0;
  let remaining=toMs(setH,setM,setS);
  let endTime=0,timerOn=false,interval=null;
  let editMode=false,editSegment=null;
  let editValues={h:0,m:0,s:0};

  function toMs(h,m,s){return((h*3600)+(m*60)+s)*1000}

  function render(ms){
    if(ms<0)ms=0;
    const total=Math.ceil(ms/1000);
    const h=Math.floor(total/3600);
    const m=Math.floor((total%3600)/60);
    const s=total%60;
    document.getElementById('seg-h').textContent=String(h).padStart(2,'0');
    document.getElementById('seg-m').textContent=String(m).padStart(2,'0');
    document.getElementById('seg-s').textContent=String(s).padStart(2,'0');
    updateFrame(ms);
  }

  function renderEdit(){
    document.getElementById('seg-h').textContent=String(editValues.h).padStart(2,'0');
    document.getElementById('seg-m').textContent=String(editValues.m).padStart(2,'0');
    document.getElementById('seg-s').textContent=String(editValues.s).padStart(2,'0');
  }

  function updateFrame(ms){
    const sec=ms/1000;
    document.body.classList.remove('warn','critical','done');
    if(ms<=0) document.body.classList.add('done');
    else if(sec<=30) document.body.classList.add('critical');
    else if(sec<=120) document.body.classList.add('warn');
  }

  function startPause(){
    if(editMode)return;
    if(!timerOn){
      if(remaining<=0)return;
      timerOn=true;
      endTime=Date.now()+remaining;
      document.getElementById('startPauseBtn').innerHTML='pause<span class="shortcut">mellomrom</span>';
      tick();
      interval=setInterval(tick,250);
    }else{
      timerOn=false;
      clearInterval(interval);
      remaining=endTime-Date.now();
      if(remaining<0)remaining=0;
      document.getElementById('startPauseBtn').innerHTML='start<span class="shortcut">mellomrom</span>';
    }
  }

  function tick(){
    remaining=endTime-Date.now();
    if(remaining<=0){
      remaining=0;
      clearInterval(interval);
      timerOn=false;
      document.getElementById('display').innerHTML='<span>ferdig</span>';
      updateFrame(0);
      document.getElementById('startPauseBtn').innerHTML='start<span class="shortcut">mellomrom</span>';
      return;
    }
    render(remaining);
  }

  function resetTimer(){
    if(editMode)exitEditMode(false);
    timerOn=false;
    clearInterval(interval);
    remaining=toMs(setH,setM,setS);
    document.getElementById('display').innerHTML=`
      <span class="time-segment" data-unit="h" id="seg-h">00</span>
      <span class="sep">:</span>
      <span class="time-segment" data-unit="m" id="seg-m">10</span>
      <span class="sep">:</span>
      <span class="time-segment" data-unit="s" id="seg-s">00</span>
      <span class="edit-hint">↑↓ juster · tab neste · enter bekreft</span>`;
    bindSegmentClicks();
    render(remaining);
    document.getElementById('startPauseBtn').innerHTML='start<span class="shortcut">mellomrom</span>';
  }

  function enterEditMode(){
    if(timerOn)return;
    if(editMode){confirmEdit();return}
    if(!document.getElementById('seg-h'))resetTimer();
    editMode=true;
    const total=Math.ceil(remaining/1000);
    editValues.h=Math.floor(total/3600);
    editValues.m=Math.floor((total%3600)/60);
    editValues.s=total%60;
    document.getElementById('display').classList.add('editing');
    setActiveSegment('m');
    renderEdit();
  }

  function setActiveSegment(unit){
    editSegment=unit;
    document.querySelectorAll('.time-segment').forEach(el=>{
      el.classList.toggle('active',el.dataset.unit===unit);
    });
  }

  function adjustSegment(delta){
    if(!editSegment)return;
    const max=editSegment==='h'?99:59;
    editValues[editSegment]=Math.max(0,Math.min(max,editValues[editSegment]+delta));
    renderEdit();
  }

  function nextSegment(){
    const order=['h','m','s'];
    const i=order.indexOf(editSegment);
    setActiveSegment(order[(i+1)%order.length]);
  }

  function confirmEdit(){
    setH=editValues.h;setM=editValues.m;setS=editValues.s;
    remaining=toMs(setH,setM,setS);
    exitEditMode(true);
  }

  function exitEditMode(apply){
    editMode=false;editSegment=null;
    document.getElementById('display').classList.remove('editing');
    document.querySelectorAll('.time-segment').forEach(el=>el.classList.remove('active'));
    render(remaining);
  }

  function bindSegmentClicks(){
    document.querySelectorAll('.time-segment').forEach(el=>{
      el.addEventListener('click',()=>{if(editMode)setActiveSegment(el.dataset.unit)});
    });
  }
  bindSegmentClicks();

  document.addEventListener('keydown',e=>{
    if(editMode){
      if(e.key==='ArrowUp'){e.preventDefault();adjustSegment(1)}
      else if(e.key==='ArrowDown'){e.preventDefault();adjustSegment(-1)}
      else if(e.key==='Tab'){e.preventDefault();nextSegment()}
      else if(e.key==='Enter'){e.preventDefault();confirmEdit()}
      else if(e.key==='Escape'){e.preventDefault();exitEditMode(false);render(remaining)}
      else if(e.key>='0'&&e.key<='9'){
        e.preventDefault();
        const cur=String(editValues[editSegment]).padStart(2,'0');
        const nv=parseInt(cur[1]+e.key,10);
        const max=editSegment==='h'?99:59;
        editValues[editSegment]=Math.min(nv,max);
        renderEdit();
      }
      return;
    }
    if(e.code==='Space'){e.preventDefault();startPause()}
    else if(e.key==='Enter'){e.preventDefault();enterEditMode()}
    else if(e.key==='Shift'){e.preventDefault();resetTimer()}
    else if(e.key==='f'||e.key==='F'){toggleFullscreen()}
  });

  function toggleFullscreen(){
    if(!document.fullscreenElement)document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
  }

  render(remaining);
</script>
</body>
</html>
